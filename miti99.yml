cv:
  name: Tien Nguyen Minh
  headline: Senior Software Engineer
  location: HCMC, VN
  email: tiennm99@outlook.com
  photo: img/avatar.jpg
  phone: (+84) 869 156 149
  website: https://miti99.com/
  social_networks:
    - network: LinkedIn
      username: miti99
    - network: GitHub
      username: tiennm99
    - network: Telegram
      username: tiennm5
  custom_connections:
    - fontawesome_icon: "facebook"
      placeholder: "Facebook"
      url: "https://www.facebook.com/tiennm99/"

  sections:
    education:
      - institution: Ho Chi Minh City University of Technology
        area: Computer Science and Engineering
        degree: B.E. in Computer Science
        date:
        start_date: 2017-09
        end_date: 2023-06
        location: Ho Chi Minh City, Vietnam
        highlights:
          - "GPA: 8.0/10 (Good)"
          - "Academic Excellence Scholarship (Học bổng khuyến khích học tập)"
          - "Recipient of the \"Five Good Student\" (Sinh viên 5 tốt) title — a university-wide recognition for academic performance, personal conduct, and community involvement"
          - "Thesis: Survival2D — Designed and implemented a high-performance multiplayer battle royale game server in Java; applied finite state machines to implement autonomous game bots"
    experience:
      - company: ZingPlay Game Studios, VNG Corporation
        position: Senior Software Engineer
        date:
        start_date: 2020-07
        end_date: present
        location: Ho Chi Minh City, Vietnam
        summary: Joined VNG as a Game Programming Fresher and progressed through Associate Software Engineer and Software Engineer to Senior Software Engineer (promoted in June 2023, advanced to level 2.2 in June 2025). Focused on scalable game server architecture and backend systems in Java (Netty, Vert.x), with consistent cross-functional contributions to client-side logic in Cocos and Godot. Passionate about architecture design and delivering reliable services to large user bases.
        highlights:
          - "[Chaos Age 2](https://play.google.com/store/apps/details?id=vn.zps.tl2): Sole server developer on a 4-person team (1 server, 2–3 client); architected the backend from scratch for a global strategy game, supporting up to ~1,000 concurrent users; also assisted the client team with networking and game logic integration"
          - "[Show](https://play.google.com/store/apps/details?id=zps.games.show) & [Burkozel](https://play.google.com/store/apps/details?id=zps.games.burkozel): Full-stack contributor on a 2-person team (1 server, 1 client) for two real-time card games targeting the Myanmar and Russian-speaking markets; delivered both server-side game logic and significant client-side feature work"
          - "[Bida3D](https://play.google.com/store/apps/details?id=zps.games.bida3d.vn): Delivered end-to-end feature development spanning server and client on a 10-person team for a global 8-ball pool game"
          - "[Sky Garden](https://play.google.com/store/apps/details?id=vn.kvtm.js): Maintained server stability for a live farm game on a 4-person team (2 server, 2 client); proactively detected and resolved production issues, developed new event features, and supported customer care workflows"
    projects:
      - name: "[Survival 2D Server](https://github.com/survival2d/server)"
        start_date: 2021-09
        summary: University thesis project — a 2D survival battle royale game server written in Java. Implemented a real-time multiplayer game loop with player synchronization, collision detection, match lifecycle management, and finite state machine-based autonomous bots.
        highlights:
      - name: "[VN GeoGuessr](https://github.com/tiennm99/vngeoguessr)"
        summary: A location-guessing game for Vietnam built with Leaflet.js, Mapillary, and OpenStreetMap, featuring street-level panoramic imagery and interactive map-based scoring.
        highlights:
      - name: "[Store Scraper Bot](https://github.com/tiennm99/store-scraper-bot)"
        summary: A Telegram bot that automates scraping and reporting of app metadata from mobile stores, useful for monitoring app listings and tracking store presence.
        highlights:
      - name: "[Static websites with Hugo](https://tiennm99.github.io/)"
        start_date: 2020-01
        end_date: present
        summary: Personal blog and static site portfolio on GitHub Pages using the Hugo framework. Also built a site for Ngăm, a community charity project.
        highlights:
      - name: "[Open Source Contributions](https://github.com/tiennm99)"
        summary: Occasional contributor to open-source projects — submitted fixes and improvements when encountering bugs while using various tools and services.
        highlights:
    skills:
      - label: Languages
        details: Java, Go, JavaScript
      - label: Frameworks & Libraries
        details: Netty, Vert.x, Spring Boot, Cocos Creator, Godot
      - label: Databases
        details: Couchbase, Redis, MySQL, ClickHouse
      - label: Infrastructure & DevOps
        details: Docker, CI/CD (GitHub Actions), Git, Linux, Oracle Cloud Infrastructure (OCI)
      - label: Architecture
        details: Game server architecture, real-time multiplayer systems, event-driven design
      - label: Languages (Spoken)
        details: Vietnamese (Native), English (TOEIC 600+)
